<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета для отправки в СВО</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #111;
            border: 2px solid #444;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #007bff;
        }
        h2 {
            text-align: center;
            color: #fff;
        }
        label {
            display: block;
            margin-top: 15px;
            color: #ccc;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #444;
            background-color: #222;
            color: #fff;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .contact-info {
            margin-top: 30px;
            text-align: center;
        }
        .contact-info a {
            color: #007bff;
            text-decoration: none;
        }
        .contact-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Анкета для отправки в СВО</h1>
    <h2>Заполните форму для подачи заявки</h2>
    <form id="anketaForm">
        <label for="fio">ФИО:</label>
        <input type="text" id="fio" name="fio" required>

        <label for="rank">Звание (если есть):</label>
        <input type="text" id="rank" name="rank">

        <label for="phone">Номер для связи:</label>
        <input type="tel" id="phone" name="phone" required>

        <button type="submit">Отправить заявку</button>
    </form>

    <div class="contact-info">
        <h3>Контактная информация</h3>
        <p>Для получения дополнительной информации, пожалуйста, свяжитесь с нами:</p>
        <p>Телефон: <a href="tel:+79991234567">+7 (999) 123-45-67</a></p>
        <p>Email: <a href="mailto:info@example.com">info@example.com</a></p>
    </div>
</div>

<script>
    document.getElementById('anketaForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const fio = document.getElementById('fio').value;
        const rank = document.getElementById('rank').value;
        const phone = document.getElementById('phone').value;

        const message = `📝 Новая заявка:\nФИО: ${fio}\nЗвание: ${rank}\nТелефон: ${phone}`;

        const botToken = '8573853910:AAGDbp23ZKf-DUe4V57mqhWUU8TytDuzXnc';
        const chatId = '@zaiavki434'; // Юзернейм вашего канала, например @mychannel

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: message })
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                alert('✅ Заявка отправлена!');
                document.getElementById('anketaForm').reset();
            } else {
                alert('❌ Ошибка: ' + data.description);
            }
        });
    });
</script>
</body>
</html>
